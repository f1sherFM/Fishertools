name: Publish Python Package to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # Позволяет запустить вручную

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Check release version consistency (tag ↔ README ↔ package)
      run: python scripts/check_release_version_consistency.py --git-tag "${{ github.event.release.tag_name }}"
        
    - name: Build package
      run: python -m build
      
    - name: Check package
      run: python -m twine check dist/*
      
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: python -m twine upload dist/* --verbose
