name: Test Matrix

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  release-encoding-guard:
    name: Release encoding guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate UTF-8 and mojibake markers in repository text files
        run: python scripts/check_text_encoding.py --root .
      - name: Validate explicit encoding in release-critical file I/O
        run: python scripts/check_explicit_encoding.py

  core:
    name: Core suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,config]
      - name: Run core tests
        run: |
          pytest -q -m "not property and not security and not slow" \
            --ignore=tests/test_backward_compatibility.py \
            --ignore=tests/test_backward_compatibility_properties.py \
            --ignore=tests/test_backward_compatibility_specific.py

  compat:
    name: Compatibility suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,config]
      - name: Run compat tests
        run: |
          pytest -q \
            tests/test_backward_compatibility.py \
            tests/test_backward_compatibility_properties.py \
            tests/test_backward_compatibility_specific.py \
            tests/test_enhancements_backward_compatibility.py \
            tests/test_legacy

  property:
    name: Property suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,config]
      - name: Run property tests
        run: pytest -q -m property

  security:
    name: Security suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,config]
      - name: Run security tests
        run: pytest -q -m security

  perf:
    name: Performance smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,config]
      - name: Run performance smoke tests
        run: pytest -q tests/test_performance_smoke.py -vv

  typing:
    name: Typing baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,config]
      - name: Run mypy baseline
        run: |
          mypy --follow-imports=silent \
            fishertools/api_mode.py \
            fishertools/cli.py \
            fishertools/patterns/logger.py \
            fishertools/errors/formatters.py \
            fishertools/errors/pattern_loader.py \
            fishertools/i18n/error_translator.py
