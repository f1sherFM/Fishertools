# Hypothesis configuration for property-based testing
# This file configures Hypothesis for the fishertools-enhancements project

[tool:hypothesis]
# Database settings
database_file = .hypothesis/examples
# Increase example count for thorough testing
max_examples = 100
# Enable statistics reporting
report_multiple_bugs = true
# Deadline for individual test cases (in milliseconds)
deadline = 5000
# Print intermediate values during shrinking
verbosity = normal
# Suppress health check warnings for specific checks
suppress_health_check = too_slow,data_too_large
# Enable deterministic mode for reproducible tests
derandomize = false